name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app and DMG
        run: make dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: JrnlBar.dmg
          generate_release_notes: true
